<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Лабораторна 4</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body id="body">

  <header class="header">
    <h1>Іванів Андрій</h1>
    <p>Лабораторна робота №4</p>

    <button id="themeBtn">
      Змінити тему
    </button>
  </header>

  <main class="container">

    <section class="card">
      <h2>Про мене</h2>
      <p>
        Студент НУ "Львівська Політехніка", спеціальність —
        Кібербезпека.
      </p>
    </section>

    <section class="card">
      <h2>Відгуки</h2>

      <div id="reviews">
        Завантаження...
      </div>
    </section>

  </main>


  <footer id="footer">
    <p id="systemInfo"></p>
  </footer>


  <div id="modal" class="modal hidden">

    <div class="modal-content">
      <span id="closeModal">&times;</span>

      <h2>Зворотній зв'язок</h2>

      <form
        action="https://formspree.io/f/mjgzkbnd"
        method="POST"
      >

        <input
          type="text"
          name="name"
          placeholder="Ваше ім'я"
          required
        />

        <input
          type="email"
          name="email"
          placeholder="Ваш Email"
          required
        />

        <input
          type="tel"
          name="phone"
          placeholder="Номер телефону"
        />

        <textarea
          name="message"
          placeholder="Ваше повідомлення"
          required
        ></textarea>

        <button type="submit">
          Надіслати
        </button>

      </form>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
